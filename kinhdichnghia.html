<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kinh Dịch – Tra Cứu 64 Quẻ Dịch</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&family=Cinzel+Decorative:wght@400;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c8a96e;
    --gold-light: #e8d09a;
    --gold-dark: #8a6b35;
    --ink: #0d0b07;
    --paper: #f5efe3;
    --paper-dark: #e8dcc8;
    --red: #8b1a1a;
    --green-old: #2a4a2a;
    --text: #1a1208;
    --muted: #6b5a3a;
    --border: #c8a96e44;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--ink);
    color: var(--text);
    font-family: 'Noto Serif', serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 20%, #1a0f0044 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, #0d1a0a44 0%, transparent 60%),
      repeating-linear-gradient(45deg, transparent, transparent 2px, #ffffff04 2px, #ffffff04 4px);
    pointer-events: none;
    z-index: 0;
  }

  /* === HEADER === */
  .site-header {
    position: relative;
    background: linear-gradient(180deg, #1a1208 0%, #0d0b07 100%);
    border-bottom: 2px solid var(--gold-dark);
    padding: 2rem 1rem 1.5rem;
    text-align: center;
    overflow: hidden;
    z-index: 10;
  }

  .site-header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .trigram-deco {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    margin-bottom: 0.8rem;
    opacity: 0.6;
    font-size: 1.8rem;
    color: var(--gold-dark);
  }

  .site-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1.4rem, 4vw, 2.2rem);
    color: var(--gold);
    letter-spacing: 0.05em;
    text-shadow: 0 0 30px #c8a96e55;
    margin-bottom: 0.3rem;
  }

  .site-subtitle {
    color: var(--gold-dark);
    font-size: 0.85rem;
    font-style: italic;
    letter-spacing: 0.15em;
  }

  /* === MAIN LAYOUT === */
  .app {
    position: relative;
    z-index: 1;
    max-width: 1400px;
    margin: 0 auto;
    padding: 1.5rem 1rem;
  }

  /* === SEARCH BAR === */
  .search-wrap {
    background: linear-gradient(135deg, #1a1208, #111008);
    border: 1px solid var(--gold-dark);
    border-radius: 4px;
    padding: 1.2rem 1.5rem;
    margin-bottom: 1.5rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.8rem;
    align-items: center;
  }

  .search-box {
    flex: 1 1 240px;
    display: flex;
    align-items: center;
    background: #0d0b07;
    border: 1px solid var(--gold-dark);
    border-radius: 3px;
    overflow: hidden;
  }

  .search-box svg {
    padding: 0 0.7rem;
    color: var(--gold-dark);
    flex-shrink: 0;
  }

  .search-box input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--gold-light);
    font-family: 'Noto Serif', serif;
    font-size: 0.95rem;
    padding: 0.65rem 0.5rem 0.65rem 0;
  }

  .search-box input::placeholder { color: var(--muted); }

  .filter-tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
  }

  .filter-tab {
    background: transparent;
    border: 1px solid var(--gold-dark);
    color: var(--muted);
    font-family: 'Noto Serif', serif;
    font-size: 0.8rem;
    padding: 0.35rem 0.9rem;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .filter-tab:hover, .filter-tab.active {
    background: var(--gold-dark);
    color: var(--gold-light);
    border-color: var(--gold);
  }

  .result-count {
    color: var(--muted);
    font-size: 0.8rem;
    width: 100%;
    padding-top: 0.2rem;
  }
  .result-count span { color: var(--gold); font-weight: 700; }

  /* === GRID === */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1rem;
  }

  /* === CARD === */
  .card {
    background: linear-gradient(160deg, #1c1508 0%, #100e06 100%);
    border: 1px solid #c8a96e33;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-dark), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .card:hover {
    border-color: var(--gold-dark);
    transform: translateY(-2px);
    box-shadow: 0 8px 30px #00000066, 0 0 20px #c8a96e11;
  }

  .card:hover::before { opacity: 1; }

  .card-inner {
    padding: 1rem 1.1rem;
    display: flex;
    align-items: flex-start;
    gap: 0.9rem;
  }

  .card-number {
    font-family: 'Cinzel Decorative', serif;
    font-size: 0.75rem;
    color: var(--gold-dark);
    background: #0d0b07;
    border: 1px solid #c8a96e33;
    border-radius: 2px;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 3px;
  }

  .card-glyph {
    font-size: 2rem;
    line-height: 1;
    color: var(--gold);
    flex-shrink: 0;
    margin-top: 2px;
    text-shadow: 0 0 15px #c8a96e66;
  }

  .card-body { flex: 1; min-width: 0; }

  .card-name-vi {
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--gold-light);
    margin-bottom: 0.15rem;
  }

  .card-name-cn {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 0.8rem;
    color: var(--gold-dark);
    margin-bottom: 0.3rem;
    letter-spacing: 0.05em;
  }

  .card-keyword {
    font-size: 0.78rem;
    color: var(--muted);
    font-style: italic;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-trigrams {
    font-size: 0.7rem;
    color: var(--gold-dark);
    margin-top: 0.3rem;
    display: flex;
    gap: 0.5rem;
  }

  /* === MODAL === */
  .modal-bg {
    position: fixed;
    inset: 0;
    background: #0d0b07cc;
    backdrop-filter: blur(6px);
    z-index: 100;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 1rem;
    overflow-y: auto;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .modal-bg.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: linear-gradient(160deg, #1c1508 0%, #100e06 100%);
    border: 1px solid var(--gold-dark);
    border-radius: 6px;
    width: 100%;
    max-width: 720px;
    margin: auto;
    position: relative;
    transform: translateY(20px);
    transition: transform 0.3s;
    overflow: hidden;
  }

  .modal-bg.open .modal { transform: translateY(0); }

  .modal-top-bar {
    background: linear-gradient(90deg, #1a1208, #0d0b07);
    border-bottom: 1px solid var(--gold-dark);
    padding: 1.2rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 1.2rem;
  }

  .modal-glyph {
    font-size: 3.5rem;
    color: var(--gold);
    text-shadow: 0 0 25px #c8a96e88;
    line-height: 1;
  }

  .modal-heading { flex: 1; }

  .modal-number {
    font-family: 'Cinzel Decorative', serif;
    font-size: 0.7rem;
    color: var(--gold-dark);
    letter-spacing: 0.2em;
    margin-bottom: 0.2rem;
  }

  .modal-name-vi {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--gold-light);
    margin-bottom: 0.15rem;
  }

  .modal-name-cn {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 1rem;
    color: var(--gold-dark);
  }

  .modal-close {
    background: transparent;
    border: 1px solid var(--gold-dark);
    color: var(--gold-dark);
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 3px;
    cursor: pointer;
    font-size: 1.1rem;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .modal-close:hover { background: var(--gold-dark); color: var(--gold-light); }

  .modal-body { padding: 1.5rem; }

  .modal-section {
    margin-bottom: 1.4rem;
    padding-bottom: 1.4rem;
    border-bottom: 1px solid #c8a96e22;
  }
  .modal-section:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

  .section-label {
    font-family: 'Cinzel Decorative', serif;
    font-size: 0.65rem;
    color: var(--gold-dark);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    margin-bottom: 0.6rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--gold-dark), transparent);
  }

  .modal-text {
    font-size: 0.9rem;
    color: #c8b896;
    line-height: 1.8;
  }

  .taga-row {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 0.8rem;
  }

  .tag {
    font-size: 0.75rem;
    padding: 0.25rem 0.8rem;
    border-radius: 20px;
    border: 1px solid;
  }
  .tag-good { border-color: #2a5a2a; color: #7ec87e; background: #0a1a0a; }
  .tag-bad { border-color: #5a1a1a; color: #c87e7e; background: #1a0a0a; }
  .tag-neutral { border-color: var(--gold-dark); color: var(--gold-dark); background: transparent; }

  .trigram-display {
    display: flex;
    gap: 2rem;
    flex-wrap: wrap;
  }

  .trigram-item {
    text-align: center;
  }

  .trigram-symbol {
    font-size: 2.2rem;
    color: var(--gold);
    display: block;
    text-shadow: 0 0 15px #c8a96e44;
  }

  .trigram-name {
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 0.2rem;
  }

  .lines-grid {
    display: grid;
    gap: 0.6rem;
  }

  .hao-item {
    background: #0d0b07;
    border: 1px solid #c8a96e22;
    border-radius: 3px;
    padding: 0.6rem 0.9rem;
  }

  .hao-label {
    font-size: 0.7rem;
    color: var(--gold-dark);
    font-family: 'Cinzel Decorative', serif;
    letter-spacing: 0.1em;
    margin-bottom: 0.3rem;
  }

  .hao-text {
    font-size: 0.82rem;
    color: #b09878;
    line-height: 1.65;
  }

  /* === NAV PREV NEXT === */
  .modal-nav {
    display: flex;
    gap: 0.5rem;
    justify-content: flex-end;
    padding: 0.8rem 1.5rem;
    border-top: 1px solid #c8a96e22;
  }

  .nav-btn {
    background: transparent;
    border: 1px solid var(--gold-dark);
    color: var(--gold-dark);
    font-family: 'Noto Serif', serif;
    font-size: 0.8rem;
    padding: 0.4rem 1rem;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .nav-btn:hover { background: var(--gold-dark); color: var(--gold-light); }

  /* === CATEGORIES === */
  .cat-badges {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    margin-bottom: 1.5rem;
  }

  .cat-badge {
    font-size: 0.75rem;
    padding: 0.3rem 0.9rem;
    border: 1px solid #c8a96e44;
    border-radius: 3px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    background: #1a1208;
  }
  .cat-badge:hover, .cat-badge.active {
    border-color: var(--gold);
    color: var(--gold-light);
    background: #2a1f0a;
  }

  /* scroll */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: #0d0b07; }
  ::-webkit-scrollbar-thumb { background: var(--gold-dark); border-radius: 3px; }

  @media (max-width: 600px) {
    .grid { grid-template-columns: 1fr; }
    .modal-glyph { font-size: 2.5rem; }
    .modal-name-vi { font-size: 1.2rem; }
  }

  /* Topic tags on image */
  .topic-tag-list {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    margin-top: 0.5rem;
  }
  .topic-tag {
    font-size: 0.7rem;
    padding: 0.2rem 0.6rem;
    background: #0d0b07;
    border: 1px solid #c8a96e33;
    border-radius: 20px;
    color: var(--muted);
  }
</style>
</head>
<body>

<header class="site-header">
  <div class="trigram-deco">☰ ☷ ☳ ☴ ☵ ☶ ☲ ☱</div>
  <h1 class="site-title">Kinh Dịch – 64 Quẻ Dịch</h1>
  <p class="site-subtitle">Tra cứu đầy đủ · Tình cảm · Sức khoẻ · Tài lộc · Công danh · Hôn nhân</p>
</header>

<div class="app">

  <!-- Search -->
  <div class="search-wrap">
    <div class="search-box">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="searchInput" placeholder="Tìm theo tên quẻ, số thứ tự, từ khoá..." autocomplete="off">
    </div>
    <div class="filter-tabs">
      <button class="filter-tab active" data-filter="all">Tất cả</button>
      <button class="filter-tab" data-filter="good">Quẻ tốt ▲</button>
      <button class="filter-tab" data-filter="bad">Quẻ xấu ▼</button>
      <button class="filter-tab" data-filter="mixed">Trung hoà ◆</button>
    </div>
    <div class="result-count">Hiển thị <span id="countSpan">64</span> / 64 quẻ</div>
  </div>

  <!-- Category topics -->
  <div class="cat-badges" id="catBadges">
    <button class="cat-badge active" data-cat="all">Xem tất cả chủ đề</button>
    <button class="cat-badge" data-cat="tinhcam">Tình cảm</button>
    <button class="cat-badge" data-cat="suckhoe">Sức khoẻ</button>
    <button class="cat-badge" data-cat="tailoc">Tài lộc</button>
    <button class="cat-badge" data-cat="congdanh">Công danh</button>
    <button class="cat-badge" data-cat="honnhan">Hôn nhân</button>
    <button class="cat-badge" data-cat="giacanh">Gia cảnh</button>
    <button class="cat-badge" data-cat="congviec">Công việc</button>
  </div>

  <div class="grid" id="queGrid"></div>
</div>

<!-- Modal -->
<div class="modal-bg" id="modalBg" onclick="handleModalBgClick(event)">
  <div class="modal" id="modal">
    <div class="modal-top-bar">
      <div class="modal-glyph" id="mGlyph">䷀</div>
      <div class="modal-heading">
        <div class="modal-number" id="mNum">QUẺ SỐ 01</div>
        <div class="modal-name-vi" id="mNameVi">Thuần Càn</div>
        <div class="modal-name-cn" id="mNameCn">乾為天 · Heaven</div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="mBody"></div>
    <div class="modal-nav">
      <button class="nav-btn" id="btnPrev" onclick="navModal(-1)">◀ Quẻ trước</button>
      <button class="nav-btn" id="btnNext" onclick="navModal(1)">Quẻ sau ▶</button>
    </div>
  </div>
</div>

<script>
// ================================================================
// DATA: 64 QUẺ DỊCH – Full dataset
// ================================================================
const QUE_DATA = [
  {
    so: 1, glyph: "䷀", vi: "Thuần Càn", cn: "乾為天", en: "The Creative",
    thuong: "Càn (☰) Trời", ha: "Càn (☰) Trời",
    kw: "Dương cực thịnh · Sáng tạo · Mạnh mẽ · Tiến lên",
    quality: "good",
    image: `Quẻ Thuần Càn gồm 6 hào dương liên tiếp, tượng trưng cho trời thuần khiết, sức mạnh sáng tạo không ngừng. 
Đây là quẻ dương cực thịnh, biểu trưng cho người quân tử có đức, đứng đầu trời đất.
Ý nghĩa: Mọi việc đang trong giai đoạn phát triển mạnh mẽ nhất, cần giữ đức hạnh để bền vững.`,
    tinhcam: "Tình cảm sáng sủa, người nam chủ động, mạnh mẽ quyết đoán. Dễ thành công nếu thực tâm. Tuy nhiên quá dương có thể kiêu ngạo, cần khiêm tốn.",
    suckhoe: "Sức khoẻ tốt, năng lượng dồi dào. Chú ý đừng quá sức, tránh nóng giận. Bệnh nếu có sẽ mau hồi phục.",
    tailoc: "Tài lộc hưng vượng, công việc kinh doanh thuận lợi. Đây là thời điểm vàng để đầu tư, mở rộng.",
    congdanh: "Sự nghiệp thăng tiến, công danh rực rỡ. Người lãnh đạo được quẻ này rất tốt. Cần giữ đức để lâu dài.",
    honnhan: "Hôn nhân tốt đẹp, người nam mạnh mẽ lo cho gia đình. Song cần biết nhường nhịn để hài hoà.",
    giacanh: "Gia đình hưng thịnh, chủ nhà mạnh khoẻ, tài sản phát triển.",
    congviec: "Công việc suôn sẻ, dễ thăng tiến, phù hợp lãnh đạo hay khởi nghiệp.",
    haos: [
      { ten: "Sơ Cửu", text: "Rồng ẩn mình, chưa nên dùng. Thời điểm tích luỹ, chưa phải lúc hành động lớn." },
      { ten: "Cửu Nhị", text: "Rồng hiện nơi đồng, lợi gặp đại nhân. Bắt đầu xuất hiện, cần người dẫn dắt." },
      { ten: "Cửu Tam", text: "Người quân tử suốt ngày nỗ lực, chiều tối lo lắng. Không có lỗi." },
      { ten: "Cửu Tứ", text: "Rồng nhảy vọt hay ở vực sâu, không có lỗi. Thời điểm chọn lựa." },
      { ten: "Cửu Ngũ", text: "Rồng bay trên trời, lợi gặp đại nhân. Đỉnh cao của thành công." },
      { ten: "Thượng Cửu", text: "Rồng kiêu ngạo, sẽ hối hận. Đỉnh cao phải biết lùi." },
    ]
  },
  {
    so: 2, glyph: "䷁", vi: "Thuần Khôn", cn: "坤為地", en: "The Receptive",
    thuong: "Khôn (☷) Đất", ha: "Khôn (☷) Đất",
    kw: "Âm cực thịnh · Nuôi dưỡng · Thuận thảo · Bền vững",
    quality: "good",
    image: `Thuần Khôn là 6 hào âm liên tiếp, đối nghịch Thuần Càn. Tượng trưng cho đất mẹ, sự nuôi dưỡng bao la.
Đây là quẻ của sự thuận thảo, nhường nhịn, bao dung, bền bỉ. Không dẫn đầu mà theo sau để thành công.`,
    tinhcam: "Nữ giới nhu hoà, dịu dàng, đây là quẻ rất tốt cho tình cảm của phụ nữ. Cặp đôi thuận thảo, bền vững.",
    suckhoe: "Sức khoẻ ổn định nhờ sinh hoạt điều độ. Cần tránh ẩm thấp, vấn đề liên quan đến bao tử.",
    tailoc: "Tài chính ổn định, chắc chắn nhờ tiết kiệm và bền bỉ. Không giàu nhanh nhưng bền lâu.",

// ================================================================
// STATE
let currentIdx = -1;
let activeFilter = 'all';
let activeCat = 'all';
let searchTerm = '';

// ================================================================
// RENDER GRID
function renderGrid() {
  const grid = document.getElementById('queGrid');
  const filtered = QUE_DATA.filter(q => {
    const matchFilter =
      activeFilter === 'all' ||
      (activeFilter === 'good' && q.quality === 'good') ||
      (activeFilter === 'bad' && q.quality === 'bad') ||
      (activeFilter === 'mixed' && q.quality === 'mixed');
    const matchSearch = searchTerm === '' ||
      q.vi.toLowerCase().includes(searchTerm) ||
      q.cn.includes(searchTerm) ||
      String(q.so).includes(searchTerm) ||
      q.kw.toLowerCase().includes(searchTerm) ||
      q.en.toLowerCase().includes(searchTerm);
    const matchCat = activeCat === 'all' || q[activeCat];
    return matchFilter && matchSearch && matchCat;
  });
  document.getElementById('countSpan').textContent = filtered.length;
  grid.innerHTML = filtered.map(q => `
    <div class="card" onclick="openModal(${q.so - 1})">
      <div class="card-inner">
        <div class="card-number">${String(q.so).padStart(2,'0')}</div>
        <div class="card-glyph">${q.glyph}</div>
        <div class="card-body">
          <div class="card-name-vi">${q.vi}</div>
          <div class="card-name-cn">${q.cn} · ${q.en}</div>
          <div class="card-keyword">${q.kw}</div>
          <div class="card-trigrams">▲ ${q.thuong} &nbsp;|&nbsp; ▼ ${q.ha}</div>
        </div>
      </div>
    </div>
  `).join('');
}

// ================================================================
// MODAL
function openModal(idx) {
  currentIdx = idx;
  const q = QUE_DATA[idx];
  document.getElementById('mGlyph').textContent = q.glyph;
  document.getElementById('mNum').textContent = `QUẺ SỐ ${String(q.so).padStart(2,'0')} · ${q.quality === 'good' ? '▲ Cát' : q.quality === 'bad' ? '▼ Hung' : '◆ Bình'}`;
  document.getElementById('mNameVi').textContent = q.vi;
  document.getElementById('mNameCn').textContent = `${q.cn} · ${q.en}`;
  const qColor = q.quality === 'good' ? 'tag-good' : q.quality === 'bad' ? 'tag-bad' : 'tag-neutral';
  document.getElementById('mBody').innerHTML = `
    <div class="modal-section">
      <div class="section-label">Biểu tượng & Ý nghĩa</div>
      <div class="taga-row">
        <span class="tag ${qColor}">${q.quality === 'good' ? '▲ Cát – Tốt lành' : q.quality === 'bad' ? '▼ Hung – Không thuận' : '◆ Bình – Trung hoà'}</span>
      </div>
      <div class="trigram-display" style="margin-bottom:1rem">
        <div class="trigram-item">
          <span class="trigram-symbol">☲</span>
          <div class="trigram-name">Thượng Quái<br>${q.thuong}</div>
        </div>
        <div class="trigram-item">
          <span class="trigram-symbol">☱</span>
          <div class="trigram-name">Hạ Quái<br>${q.ha}</div>
        </div>
      </div>
      <div class="modal-text">${q.image.replace(/\n/g,'<br>')}</div>
    </div>
    <div class="modal-section">
      <div class="section-label">Từ khoá</div>
      <div class="taga-row">${q.kw.split('·').map(k=>`<span class="tag tag-neutral">${k.trim()}</span>`).join('')}</div>
    </div>
    <div class="modal-section">
      <div class="section-label">Tình Cảm & Hôn Nhân</div>
      <div class="modal-text"><strong style="color:var(--gold-dark)">❤ Tình cảm:</strong> ${q.tinhcam}</div>
      <div class="modal-text" style="margin-top:0.6rem"><strong style="color:var(--gold-dark)">💍 Hôn nhân:</strong> ${q.honnhan}</div>
    </div>
    <div class="modal-section">
      <div class="section-label">Sức Khoẻ & Tài Lộc</div>
      <div class="modal-text"><strong style="color:var(--gold-dark)">🌿 Sức khoẻ:</strong> ${q.suckhoe}</div>
      <div class="modal-text" style="margin-top:0.6rem"><strong style="color:var(--gold-dark)">💰 Tài lộc:</strong> ${q.tailoc}</div>
    </div>
    <div class="modal-section">
      <div class="section-label">Công Danh & Công Việc</div>
      <div class="modal-text"><strong style="color:var(--gold-dark)">🏆 Công danh:</strong> ${q.congdanh}</div>
      <div class="modal-text" style="margin-top:0.6rem"><strong style="color:var(--gold-dark)">💼 Công việc:</strong> ${q.congviec}</div>
    </div>
    <div class="modal-section">
      <div class="section-label">Gia Cảnh</div>
      <div class="modal-text">${q.giacanh}</div>
    </div>
    <div class="modal-section">
      <div class="section-label">Hào Từ – Luận Giải 6 Hào</div>
      <div class="lines-grid">
        ${q.haos.map(h=>`<div class="hao-item"><div class="hao-label">${h.ten}</div><div class="hao-text">${h.text}</div></div>`).join('')}
      </div>
    </div>
  `;
  document.getElementById('btnPrev').disabled = idx === 0;
  document.getElementById('btnNext').disabled = idx === QUE_DATA.length - 1;
  document.getElementById('modalBg').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalBg').classList.remove('open');
  document.body.style.overflow = '';
}

function navModal(dir) {
  const newIdx = currentIdx + dir;
  if (newIdx >= 0 && newIdx < QUE_DATA.length) openModal(newIdx);
}

function handleModalBgClick(e) {
  if (e.target === document.getElementById('modalBg')) closeModal();
}

// ================================================================
// EVENTS
document.getElementById('searchInput').addEventListener('input', e => {
  searchTerm = e.target.value.toLowerCase().trim();
  renderGrid();
});

document.querySelectorAll('.filter-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    renderGrid();
  });
});

document.querySelectorAll('.cat-badge').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.cat-badge').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeCat = btn.dataset.cat;
    renderGrid();
  });
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if (document.getElementById('modalBg').classList.contains('open')) {
    if (e.key === 'ArrowLeft') navModal(-1);
    if (e.key === 'ArrowRight') navModal(1);
  }
});

// Init
renderGrid();
</script>
</body>
</html>
